<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaf Disease Detection | Leaflence</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

/* --- ENHANCED BACKGROUND --- */
body{
/* Animated Gradient Background */
background: linear-gradient(-45deg, #e6f9ec, #c6f6d5, #a7f3d0, #d1fae5);
background-size: 400% 400%;
animation: gradientBG 15s ease infinite;
font-family:'Poppins',sans-serif;
min-height:100vh;
margin:0;
padding:0;
overflow-x:hidden;
color:#065f46;
position:relative;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* PARTICLE CANVAS */
#bg-particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

/* --- ENTRANCE ANIMATIONS --- */
.header-wrapper, .glass-card {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

/* Staggered animation for card */
.glass-card {
    animation-delay: 0.2s;
}

@keyframes fadeInUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* TITLE */
.header-wrapper{
position:relative;
z-index:2;
margin-bottom:50px;
}

.title{
font-weight:700;
font-size:3.5rem;
letter-spacing:2px;
margin-bottom:10px;
text-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.subtitle{
font-weight:300;
opacity:0.8;
margin-bottom:40px;
letter-spacing:1px;
}

/* GREEN GRADIENT TEXT */
.leaflence-gradient{
background: linear-gradient(90deg,#16a34a,#22c55e,#4ade80);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-size: 200% auto;
animation: gradientText 3s linear infinite;
}

@keyframes gradientText {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
}

/* GLASS CARD */
.glass-card{
background: rgba(255,255,255,0.65);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.8);
border-radius:24px;
box-shadow:0 8px 32px rgba(0,0,0,0.1);
position:relative;
z-index:2;
overflow:hidden;
transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Shimmer Effect on Card */
.glass-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
    transform: skewX(-25deg);
    animation: shimmer 6s infinite;
    pointer-events: none;
}

@keyframes shimmer {
    0% { left: -100%; }
    20% { left: 200%; }
    100% { left: 200%; }
}

.glass-card:hover{
box-shadow:0 15px 45px rgba(0,0,0,0.15);
transform: translateY(-5px);
}

/* FILE UPLOAD */
.upload-label{
cursor:pointer;
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
border:2px dashed #22c55e;
padding:30px;
border-radius:16px;
background:#ecfdf5;
position: relative;
overflow: hidden;
}

.upload-label:hover{
border-color:#16a34a;
background:#d1fae5;
transform:scale(1.02);
box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
}

/* Ripple effect on click */
.upload-label:active {
    transform: scale(0.98);
}

input[type="file"]{
display:none;
}

/* BUTTON */
.btn-animated{
background: linear-gradient(90deg,#16a34a,#22c55e);
border:none;
color:#fff;
font-weight:600;
font-size:1.1rem;
border-radius:50px;
position:relative;
transition:.4s;
box-shadow:0 4px 15px rgba(34,197,94,0.4);
margin-top:20px;
overflow: hidden;
}

.btn-animated::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
}

.btn-animated:hover::after {
    opacity: 1;
}

.btn-animated:hover{
transform:translateY(-3px);
background: linear-gradient(90deg,#22c55e,#16a34a);
box-shadow:0 8px 25px rgba(34,197,94,0.6);
}

.btn-loader{
display:none;
width:20px;
height:20px;
border:3px solid rgba(255,255,255,0.3);
border-radius:50%;
border-top-color:#fff;
animation:spin 1s linear infinite;
position:absolute;
left:50%;
top:50%;
margin-left:-10px;
margin-top:-10px;
}

.btn-animated.loading .btn-text{display:none;}
.btn-animated.loading .btn-loader{display:block;}

/* LOADING */
.loading-overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(240,253,244,0.98);
z-index:10;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
border-radius:24px;
}

.scanner-line{
width:80%;
height:4px;
background:#22c55e;
box-shadow:0 0 15px #22c55e;
margin-bottom:20px;
animation:scan 2s infinite linear;
}

/* Pulse effect for the AI core */
.ai-core {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid #22c55e;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
}

.ai-core::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid #22c55e;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.5); opacity: 0; }
}

/* RESULT CARD */
.result-card{
background:#ecfdf5;
border:1px solid #bbf7d0;
border-radius:20px;
padding:30px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
animation: slideIn 0.5s ease-out;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.result-image{
max-width:220px;
width:100%;
border-radius:16px;
box-shadow:0 8px 24px rgba(0,0,0,0.2);
border:3px solid #22c55e;
transition:.3s;
}

.result-image:hover{
transform:scale(1.05) rotate(2deg);
}

.disease-badge{
background: linear-gradient(90deg,#22c55e,#16a34a);
padding:10px 25px;
border-radius:50px;
font-weight:700;
font-size:1.3rem;
color:white;
display:inline-block;
margin-bottom:15px;
box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
}

/* MOBILE RESPONSIVE */
@media (max-width:768px){

.title{
font-size:2.2rem;
}

.subtitle{
font-size:0.9rem;
}

.glass-card{
margin:10px;
}

.upload-label{
padding:20px;
}

.result-card{
text-align:center;
}

.result-image{
margin:auto;
margin-bottom:20px;
}

}

/* ANIMATIONS */
@keyframes spin{
to{transform:rotate(360deg)}
}

@keyframes scan{
0%{transform:translateY(-50px);opacity:0}
50%{opacity:1}
100%{transform:translateY(50px);opacity:0}
}

</style>

</head>

<body>

<canvas id="bg-particles"></canvas>

<div class="container text-center mt-5">

<div class="header-wrapper">
<h1 class="title">
<span class="leaflence-gradient"><i class="fas fa-leaf"></i> Leaflence</span>
</h1>
<p class="subtitle">AI-Powered Plant Health Analysis</p>
</div>

<div class="glass-card card">
<div class="card-body p-5">

<form method="POST" enctype="multipart/form-data" id="detectionForm">

<div class="mb-4">
<label class="upload-label">
<i class="fas fa-cloud-upload-alt fa-3x mb-3" style="color:#16a34a;"></i>
<h4>Upload Leaf Image</h4>
<p class="text-muted">Drag & drop or click to browse</p>
<input type="file" name="leaf" id="fileInput" required accept="image/*">
</label>

<div id="fileName" class="mt-2 text-success fw-bold"></div>
</div>

<button type="submit" class="btn btn-animated w-100 py-3">
<span class="btn-text">Analyze Leaf</span>
<div class="btn-loader"></div>
</button>

</form>

<div id="loadingOverlay" class="loading-overlay d-none">
<div class="ai-core">
    <i class="fas fa-microchip fa-2x" style="color:#22c55e;"></i>
</div>
<p>Scanning for plant disease...</p>
</div>

{% if result %}

<div class="result-card mt-4">
<div class="row align-items-center">

<div class="col-md-4 text-center">
<img src="{{image}}" class="img-fluid result-image">
</div>

<div class="col-md-8 text-start">
<div class="disease-badge">
<i class="fas fa-exclamation-triangle"></i> {{result}}
</div>

<p class="mt-3">{{description}}</p>

<button class="btn btn-outline-success btn-sm" onclick="window.location.reload()">
Analyze Another Leaf
</button>

</div>
</div>
</div>
{% endif %}

</div>
</div>
</div>

<script>

document.addEventListener('DOMContentLoaded',function(){

const canvas=document.getElementById('bg-particles');
const ctx=canvas.getContext('2d');

let particles=[];
const colors=['#22c55e','#4ade80','#16a34a','#86efac','#bbf7d0'];

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

window.addEventListener('resize',resizeCanvas);
resizeCanvas();

function drawLeaf(x,y,size,rotation,color,opacity){
ctx.save();
ctx.translate(x,y);
ctx.rotate(rotation);
ctx.globalAlpha=opacity;
ctx.fillStyle=color;
ctx.beginPath();
ctx.moveTo(0,0);
ctx.bezierCurveTo(size*0.5,-size*0.3,size,0,0,size*1.5);
ctx.bezierCurveTo(-size,0,-size*0.5,-size*0.3,0,0);
ctx.fill();

/* leaf vein */
ctx.strokeStyle='rgba(255,255,255,0.4)';
ctx.lineWidth=1;
ctx.beginPath();
ctx.moveTo(0,0);
ctx.lineTo(0,size*1.2);
ctx.stroke();

ctx.restore();
}

class LeafParticle{

constructor(){
this.reset();
}

reset(){
this.x=Math.random()*canvas.width;
this.y=canvas.height+Math.random()*100;
this.size=Math.random()*10+4;
this.speedY=Math.random()*1+0.3;
this.speedX=(Math.random()-0.5)*0.5;
this.color=colors[Math.floor(Math.random()*colors.length)];
this.opacity=Math.random()*0.5+0.3;
this.rotation=Math.random()*Math.PI*2;
this.rotationSpeed=(Math.random()-0.5)*0.02;
}

update(){
this.y-=this.speedY;
this.x+=this.speedX;
this.rotation+=this.rotationSpeed;

if(this.y<-50){
this.reset();
this.x=Math.random()*canvas.width;
}
}

draw(){
drawLeaf(this.x,this.y,this.size,this.rotation,this.color,this.opacity);
}

}

function initParticles(){
particles=[];
for(let i=0;i<60;i++){
particles.push(new LeafParticle());
}
}

function animateParticles(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.update();
p.draw();
});

requestAnimationFrame(animateParticles);
}

initParticles();
animateParticles();

/* FORM LOGIC */

const form=document.getElementById("detectionForm");
const fileInput=document.getElementById("fileInput");
const fileNameDisplay=document.getElementById("fileName");
const btn=document.querySelector(".btn-animated");
const loadingOverlay=document.getElementById("loadingOverlay");

/* show selected file name */

fileInput.addEventListener("change",function(){

if(this.files && this.files[0]){
fileNameDisplay.textContent="Selected: "+this.files[0].name;
}

});

/* show loader when submitting */

form.addEventListener("submit",function(){

btn.classList.add("loading");
loadingOverlay.classList.remove("d-none");
btn.disabled=true;

});

}); </script>

</body>
</html>
